    <style>
        /* ─── RESET ─────────────────────────────────────── */
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        html { font-size: 16px; }
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #000 url('assets/hero-bg.jpg') center/cover no-repeat fixed;
            color: #F5F0E8;
            min-height: 100vh;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }
        a { color: inherit; text-decoration: none; }
        img { max-width: 100%; display: block; }
        button { font-family: inherit; cursor: pointer; border: none; background: none; }

        /* ─── VARIABLES ──────────────────────────────────── */
        :root {
            --gold:        #C9A84C;
            --gold-light:  #E8C96A;
            --gold-border: rgba(201, 168, 76, 0.28);
            --text-primary:#F5F0E8;
            --text-sec:    #9A8E82;
            --text-muted:  #5E554D;
        }

        /* ─── FULL-PAGE OVERLAY ──────────────────────────── */
        body::before {
            content: '';
            position: fixed; inset: 0;
            background: linear-gradient(
                to bottom,
                rgba(0,0,0,0.84) 0%,
                rgba(0,0,0,0.70) 40%,
                rgba(0,0,0,0.88) 100%
            );
            z-index: 0;
        }

        /* ─── PAGE LAYOUT ────────────────────────────────── */
        .page {
            position: relative; z-index: 1;
            min-height: 100vh;
            display: flex; align-items: center; justify-content: center;
            padding: clamp(1.5rem, 5vw, 3rem) 1.25rem;
        }

        /* ─── GLASS CARD ─────────────────────────────────── */
        .card {
            max-width: 480px; width: 100%;
            background: rgba(8, 7, 5, 0.72);
            backdrop-filter: blur(28px) saturate(120%);
            -webkit-backdrop-filter: blur(28px) saturate(120%);
            border: 1px solid rgba(201, 168, 76, 0.22);
            border-radius: 14px;
            padding: clamp(2rem, 7vw, 3rem) clamp(1.5rem, 6vw, 2.75rem);
            display: flex; flex-direction: column; align-items: center;
            text-align: center;
            box-shadow:
                0 0 0 1px rgba(0,0,0,0.5),
                0 32px 80px rgba(0,0,0,0.65),
                inset 0 1px 0 rgba(201,168,76,0.10);
            animation: card-in 0.65s cubic-bezier(0.16, 1, 0.3, 1) both;
        }
        @media (min-width: 768px) {
            .card         { max-width: 576px; }
            .headline     { font-size: 3.5rem; }
            .sub          { font-size: 1.15rem; }
            .info-row     { font-size: 1.1rem; }
            .info-grid    { padding: 1.4rem 1.75rem; gap: 0.75rem; }
            .message      { font-size: 0.95rem; }
        }
        @keyframes card-in {
            from { opacity: 0; transform: translateY(18px) scale(0.98); }
            to   { opacity: 1; transform: translateY(0)   scale(1); }
        }

        /* ─── LOGO ───────────────────────────────────────── */
        .logo-wrap {
            position: relative;
            display: flex; align-items: center; justify-content: center;
            margin-bottom: 1.75rem;
        }
        .logo-glow {
            position: absolute;
            width: 200px; height: 110px;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            background: radial-gradient(ellipse, rgba(201,168,76,0.20) 0%, transparent 70%);
            animation: logo-glow 3s ease-in-out infinite;
            pointer-events: none;
        }
        @keyframes logo-glow {
            0%,100% { opacity: 0.55; transform: translate(-50%,-50%) scale(1); }
            50%      { opacity: 1;    transform: translate(-50%,-50%) scale(1.18); }
        }
        .logo-big {
            height: clamp(68px, 18vw, 100px);
            width: auto;
            position: relative; z-index: 1;
            opacity: 0.95;
            filter: drop-shadow(0 0 14px rgba(201,168,76,0.28));
        }

        /* ─── HEADLINE ───────────────────────────────────── */
        .headline {
            font-family: 'Barlow Condensed', sans-serif;
            font-weight: 900; text-transform: uppercase;
            font-size: clamp(2rem, 7vw, 3rem);
            letter-spacing: 0.03em; line-height: 1.05;
            color: var(--text-primary); margin-bottom: 0.3rem;
        }
        .sub {
            font-family: 'Playfair Display', serif;
            font-style: italic;
            font-size: clamp(0.9rem, 2.5vw, 1.05rem);
            color: var(--gold-light); margin-bottom: 1.75rem;
        }

        /* ─── EVENT INFO GRID ────────────────────────────── */
        .info-grid {
            width: 100%;
            background: rgba(0,0,0,0.35);
            border: 1px solid rgba(255,255,255,0.07);
            border-radius: 8px;
            padding: 1.25rem 1.4rem;
            display: flex; flex-direction: column; gap: 0.6rem;
            margin-bottom: 1.75rem;
            text-align: left;
        }
        .info-row {
            display: flex; align-items: flex-start; gap: 0.65rem;
            font-size: clamp(0.95rem, 2.8vw, 1.05rem);
            color: var(--text-sec); line-height: 1.5;
        }
        .info-icon { color: var(--gold); font-size: 0.7rem; flex-shrink: 0; margin-top: 3px; }
        .info-row a { color: var(--gold); border-bottom: 1px solid rgba(201,168,76,0.30); }

        /* ─── MESSAGE ────────────────────────────────────── */
        .message {
            font-size: clamp(0.8rem, 2.2vw, 0.875rem);
            color: var(--text-sec); line-height: 1.75;
            margin-bottom: 1.75rem;
        }
        .message a {
            color: var(--gold);
            border-bottom: 1px solid rgba(201,168,76,0.30);
        }
        .email-notice {
            display: flex; align-items: center; gap: 0.6rem;
            background: rgba(201,168,76,0.08);
            border: 1px solid rgba(201,168,76,0.20);
            border-radius: 6px;
            padding: 0.75rem 1rem;
            margin-bottom: 1rem;
            width: 100%;
        }
        .email-notice__icon { color: var(--gold); font-size: 1rem; flex-shrink: 0; }
        .email-notice__text {
            font-size: clamp(0.95rem, 2.8vw, 1.05rem);
            font-weight: 600; color: var(--text-primary);
            line-height: 1.4; text-align: left;
        }
        .message--sub {
            font-size: clamp(0.75rem, 2vw, 0.82rem);
            color: var(--text-muted); margin-bottom: 1.75rem;
        }
        .message--sub a { color: var(--gold); border-bottom: 1px solid rgba(201,168,76,0.30); }

        /* ─── BUTTONS ────────────────────────────────────── */
        .btn-row { width: 100%; display: flex; flex-direction: column; gap: 0.65rem; }

        .btn-primary {
            display: block; width: 100%; padding: 1rem;
            background: var(--gold); color: #000;
            font-family: 'Barlow Condensed', sans-serif;
            font-size: 1.05rem; font-weight: 800; letter-spacing: 0.10em;
            text-transform: uppercase; border-radius: 6px; text-align: center;
            transition: background 0.18s;
        }
        .btn-primary:hover { background: var(--gold-light); }


    </style>

<body>

<main class="page">
    <div class="card">

        <div class="logo-wrap">
            <div class="logo-glow"></div>
            <img src="assets/ruk-logo.png" alt="Rise Up Kings" class="logo-big">
        </div>

        <h1 class="headline">Seat Confirmed</h1>
        <p class="sub">We'll see you at the table.</p>

        <div class="info-grid">
            <div class="info-row">
                <span class="info-icon">◈</span>
                <span>Kingdom Scaling Principles Business Lunch</span>
            </div>
            <div class="info-row">
                <span class="info-icon">◈</span>
                <span id="event-date-display">Tuesday, August 4, 2026 &nbsp;·&nbsp; 12:00–2:00 PM</span>
            </div>
            <div class="info-row">
                <span class="info-icon">◈</span>
                <span>Rise Up Kings HQ &nbsp;·&nbsp; <a href="https://maps.app.goo.gl/mFrX6XaScXiE6wnx8" target="_blank" rel="noopener noreferrer">Dallas–Fort Worth, TX</a></span>
            </div>
        </div>

        <div class="email-notice">
            <span class="email-notice__icon">✓</span>
            <span class="email-notice__text">A confirmation email is on its way to you.</span>
        </div>
        <p class="message--sub">
            Questions?&nbsp;<a href="mailto:support@riseupkings.com">support@riseupkings.com</a>
        </p>

        <div class="btn-row">
            <a href="/" class="btn-primary">← Back to Main Page</a>
        </div>

    </div>
</main>

<script>
'use strict';

// ── Known event dates (keep in sync with script.js CONFIG) ──────────────────
const EVENT_DATES = {
    '2026-08-04': 'Tuesday, August 4, 2026',
    '2026-09-01': 'Tuesday, September 1, 2026',
    '2026-10-06': 'Tuesday, October 6, 2026',
    '2026-11-03': 'Tuesday, November 3, 2026',
};

// ── Read & sanitize URL params ───────────────────────────────────────────────
const params = new URLSearchParams(window.location.search);
const rawDates = params.get('dates') || '';

const selectedDates = rawDates
    .split(',')
    .map(d => d.trim())
    .filter(d => /^\d{4}-\d{2}-\d{2}$/.test(d))   // must be YYYY-MM-DD
    .filter(d => EVENT_DATES[d])                     // must be a known date
    .slice(0, 4);                                    // max 4 dates

// ── Update displayed date ────────────────────────────────────────────────────
const dateEl = document.getElementById('event-date-display');
if (dateEl && selectedDates.length > 0) {
    const labels = selectedDates.map(d => EVENT_DATES[d]);
    if (labels.length === 1) {
        dateEl.textContent = labels[0] + '\u00a0\u00b7\u00a012:00\u20132:00\u00a0PM';
    } else {
        dateEl.textContent = labels.join('\u00a0\u00b7\u00a0') + '\u00a0\u00b7\u00a012:00\u20132:00\u00a0PM each';
    }
}


</script>

</body>
</html>
